<!DOCTYPE HTML>
<html lang="eng" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Student Confirmation</title>
</head>

<body>

<h3>Student Confirmation</h3>

The student is confirmed: <span th:text="${student.firstName} + ' ' + ${student.lastName}"></span>

<br><br>

Country: <span th:text="${student.country}"></span>

<br><br>

Favorite P Language: <span th:text="${student.favoriteLanguage}"></span>

<br><br>

F Operating Systems:

<ul>
    <li th:each="tempSystem : ${student.operatingSystems}" th:text="${tempSystem}"></li>
</ul>
</body>

</html>
